<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A premium 3D health and wellness website" />
    <title>HealthCore 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="content">
      <header>
        <div class="logo">Health<span class="logo-accent">Core</span></div>
        <nav>
          <a href="#">Home</a>
          <a href="#">Services</a>
          <a href="#">Research</a>
          <a href="#">Contact</a>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark/Light Mode">☀️</button>
        </nav>
      </header>
      
      <main>
        <h1>Visualize Your <span class="highlight">Wellness</span></h1>
        <p>Explore the building blocks of life through an interactive, next-generation medical platform.</p>
        
        <div class="auth-container">
          <div class="auth-tabs">
            <button id="tab-login" class="active">Login</button>
            <button id="tab-signup">Signup</button>
          </div>

          <!-- Login Form -->
          <form id="login-form" class="auth-form">
            <h2>Welcome Back</h2>
            <input type="text" id="login-username" placeholder="Username" required />
            <input type="password" id="login-password" placeholder="Password" required />
            <button type="submit" class="cta-button">Login</button>
          </form>

          <!-- Signup Form -->
          <form id="signup-form" class="auth-form hidden">
            <h2>Create Account</h2>
            <input type="text" id="signup-username" placeholder="Username" required />
            <input type="password" id="signup-password" placeholder="Password" required />
            <button type="submit" class="cta-button">Signup</button>
          </form>

          <p id="auth-message"></p>
        </div>
      </main>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
